<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortURL</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}
body{
    background:linear-gradient(135deg,#5f2c82,#49a09d);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

/* NAVBAR */
nav{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}
.logo img{height:45px;}
nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:16px;
}
nav a:hover{opacity:0.7;}

/* MAIN CARD */
.container{
    background:white;
    color:black;
    padding:40px;
    border-radius:12px;
    width:420px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
}
h1{margin-bottom:25px;}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#2575fc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    margin-top:10px;
}
button:hover{background:#1d5ed6;}

/* ERROR MESSAGE */
.error{
    color:red;
    margin-top:10px;
    font-weight:600;
}

/* RESULT */
.result{
    margin-top:20px;
    padding:12px;
    background:#f4f4f4;
    border-radius:6px;
    word-wrap:break-word;
}
.result a{
    color:#2575fc;
    text-decoration:none;
    font-weight:600;
}

/* FOOTER */
footer{
    position:absolute;
    bottom:10px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>
<body>

<nav>
    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}">
    </div>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</nav>

<div class="container">
    <h1>Create Short URL</h1>

    <form method="POST">
        <input type="text" name="original_url" placeholder="Enter your long URL" value="{{ original_url|default('') }}" required>
        <input type="text" name="custom_code" placeholder="Custom short URL (optional)" value="{{ custom_code|default('') }}">
        <button type="submit">Shorten URL</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if short_url %}
    <div class="result">
        <p>Your Short URL:</p>
        <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>
    </div>
    {% endif %}
</div>

<footer>
    <p>© 2026 ShortURL</p>
</footer>
</body>
</html>
