<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click History</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins', sans-serif;}
body{background:linear-gradient(135deg,#5f2c82,#49a09d); min-height:100vh; color:white;}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;}
.logo img{height:45px;}
nav a{color:white;text-decoration:none;margin-left:25px;font-size:16px;}
nav a:hover{opacity:0.7;}
.title{text-align:center;margin-top:40px;font-size:42px;}
.container{width:70%;margin:40px auto;background:white;color:black;padding:30px;border-radius:12px;box-shadow:0 15px 35px rgba(0,0,0,0.25);overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th, td{padding:12px;text-align:center;border-bottom:1px solid #ddd;}
th{background:#2575fc;color:white;}
tr:hover{background:#f5f5f5;}
.btn{display:inline-block;margin-top:20px;padding:10px 18px;background:#2575fc;color:white;text-decoration:none;border-radius:6px;font-size:14px;}
.btn:hover{background:#1d5ed6;}
footer{text-align:center;margin-top:40px;padding:20px;opacity:0.8;}
</style>
</head>
<body>

<nav>
    <div class="logo"><img src="{{ url_for('static', filename='logo.png') }}"></div>
    <div>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</nav>

<h1 class="title">Click History</h1>

<div class="container">
    <table>
        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>IP Address</th>
            <th>Location</th>
        </tr>
        {% for click in clicks %}
        {% set datetime_parts = click[0].split(' ') %}
        <tr>
            <td>{{ datetime_parts[0] }}</td>
            <td>{{ datetime_parts[1] }}</td>
            <td>{{ click[1] }}</td>
            <td>{{ click[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a class="btn" href="/dashboard">Back to Dashboard</a>
</div>

<footer>
<p>© 2026 ShortURL</p>
</footer>

</body>
</html>
